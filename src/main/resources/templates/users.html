<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Utenti</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div sec:authorize="isAuthenticated()">

        <h1 class="text-center mb-4">Utenti</h1>
        <h3 class="text-center" th:text="${#calendars.format(#calendars.createNow(), 'dd MMM yyyy HH:mm')}"></h3>

        <div class="table-responsive">

            <table class="table table-bordered table-striped text-center align-middle">

                <thead class="table-dark">
                <tr>
                    <th>UserId</th>
                    <th>Bollette Totali</th>
                    <th>Bollette Analizzate</th>
                <th>Ultimo accesso</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${users == null || #lists.isEmpty(users)}">
                    <td colspan="4">Nessun utente</td>
                </tr>

                <tr th:each="p : ${users}">
                    <td th:text="${p.userid}"></td>
                    <td th:text="${p.bolletteTotali}"></td>
                    <td th:text="${p.bolletteAnalizzate}"></td>
                    <td th:text="${p.lastAccess}"></td>

               </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div sec:authorize="!isAuthenticated()" class="text-center">
        <h4>Non sei loggato</h4>
    </div>

</div>

</body>
</html>
