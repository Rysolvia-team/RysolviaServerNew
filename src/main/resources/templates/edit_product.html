<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifica prodotto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        form {
            width: 450px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-row label {
            width: 150px;
            font-weight: bold;
        }

        .form-row input {
            flex: 1;
            padding: 8px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Modifica prodotto</h1>

<form th:action="@{/web/products/update}"
      th:object="${product}"
      method="post">

    <input type="hidden" th:field="*{id}" />

    <div class="form-row">
        <label>Nome:</label>

        <input type="text"
               th:field="*{name}"
               required />
    </div>

    <div class="form-row">
        <label>Prezzo:</label>

        <input type="number"
               step="0.01"
               th:field="*{prezzo}"
               required />
    </div>

    <div class="form-row">
        <label>Descrizione:</label>

        <input type="text"
               th:field="*{description}" />
    </div>

    <div class="form-row">
        <label>Numero bollette:</label>

        <input type="number"
               step="1"
               th:field="*{numero_bollette}"
               required />
    </div>

    <button type="submit">
        Salva
    </button>

</form>

</body>
</html>
