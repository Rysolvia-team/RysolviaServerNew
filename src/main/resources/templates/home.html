<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Status</title>

    <!-- (opzionale ma consigliato) Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <!-- LOGGATO -->
    <div sec:authorize="isAuthenticated()">

        <h1 class="text-center mb-4">Status</h1>

        <div class="table-responsive">

            <table class="table table-bordered table-striped text-center">
                <thead class="table-dark">
                <tr>
                    <th>Token</th>
                    <th>Incasso</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${status == null || #lists.isEmpty(status)}">
                    <td colspan="2">Nessun dato disponibile</td>
                </tr>

                <tr th:each="p : ${status}">
                    <td th:text="${p.token_totali}"></td>
                    <td th:text="${p.incassoTotale}"></td>
                </tr>
                </tbody>

            </table>
<h3>Totale utenti: <span th:text="${nusers}"></span></h3>
        </div>
    </div>

    <!-- NON LOGGATO -->
    <div sec:authorize="!isAuthenticated()" class="text-center">
        <h4>Non sei loggato</h4>
    </div>

</div>

</body>
</html>
