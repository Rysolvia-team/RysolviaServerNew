<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Prodotti</title>

    <style>

        body {
            font-family: Arial;
        }

        table {
            border-collapse: collapse;
            width: 80%;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
        }

        a {
            margin-right: 10px;
        }

        .btn {
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

    </style>
</head>

<body>

<h1>Lista Prodotti</h1>

<br>

<a class="btn" th:href="@{/web/products/new}">
    Nuovo prodotto
</a>

<br><br>

<table>

    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Prezzo</th>
        <th>Description</th>
        <th>Num. Bollette</th>
    </tr>

    <tr th:each="p : ${products}">

        <td th:text="${p.id}"></td>

        <td th:text="${p.name}"></td>

        <td th:text="${p.prezzo}"></td>
        <td th:text="${p.description}"></td>
         <td th:text="${p.numero_bollette}"></td>

        <td>

            <a th:href="@{/web/products/edit/{id}(id=${p.id})}">
                Modifica
            </a>

            <a th:href="@{/web/products/delete/{id}(id=${p.id})}">
                Elimina
            </a>

        </td>

    </tr>

</table>

</body>
</html>
