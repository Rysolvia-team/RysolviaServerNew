<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Prodotti</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div sec:authorize="isAuthenticated()">

        <h1 class="text-center mb-4">Prodotti</h1>

        <div class="table-responsive">

            <table class="table table-bordered table-striped text-center align-middle">

                <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Descrizione</th>
                    <th>N. Bollette</th>
                    <th>Prezzo</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${products == null || #lists.isEmpty(products)}">
                    <td colspan="4">Nessun prodotto disponibile</td>
                </tr>

                <tr th:each="p : ${products}">
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.description}"></td>
                    <td th:text="${p.numero_bollette}"></td>

                    <!-- FIX PREZZO -->
                    <td th:text="${#numbers.formatDecimal(p.prezzo / 100.0, 1, 2)} + ' €'"></td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div sec:authorize="!isAuthenticated()" class="text-center">
        <h4>Non sei loggato</h4>
    </div>

</div>

</body>
</html>
